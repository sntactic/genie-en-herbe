<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Génie en Herbe — IPSL</title>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --maroon-dark:#3D1C10;--maroon-mid:#6B2D1A;--maroon-main:#8B3A22;
  --maroon-light:#C46B44;--maroon-pale:#E8A882;--cream:#F5EDE6;--cream-dark:#EDD5C3;
  --gold:#D4A843;--gold-light:#F0C97A;--team-a:#C4441A;--team-b:#2E6DA4;
  --text-primary:#2A0E06;--text-secondary:#6B3A28;--white:#FFFFFF;
  --shadow:0 4px 24px rgba(61,28,16,0.18);--radius:12px;
  --bottom-h:88px;
}
html{font-size:16px}
body{background:var(--cream);font-family:'Inter',sans-serif;color:var(--text-primary);min-height:100vh;overflow-x:hidden}

.screen{display:none;min-height:100vh;flex-direction:column;animation:fadeIn .4s ease}
.screen.active{display:flex}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

#setup{background:linear-gradient(160deg,var(--maroon-dark) 0%,var(--maroon-mid) 60%,var(--maroon-light) 100%);color:var(--cream)}
.setup-body{flex:1;display:flex;align-items:center;justify-content:center;padding:32px 16px}
.setup-card{
  background:rgba(255,255,255,0.06);border:1px solid rgba(228,168,130,0.2);
  border-radius:20px;padding:40px 48px;width:100%;max-width:820px;backdrop-filter:blur(4px);
}
.setup-logo-center{text-align:center;margin-bottom:24px}
.setup-logo-center img{height:64px;filter:brightness(1.2) saturate(0.8)}
.setup-title{
  font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;text-align:center;
  color:var(--gold-light);letter-spacing:3px;text-transform:uppercase;margin-bottom:32px;
}
.setup-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px}
.setup-team h3{
  font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:600;text-transform:uppercase;
  letter-spacing:2px;margin-bottom:16px;padding-bottom:8px;border-bottom:2px solid;
}
.setup-team.team-a h3{color:var(--team-a);border-color:var(--team-a)}
.setup-team.team-b h3{color:#6BA8D4;border-color:#6BA8D4}
.form-group{margin-bottom:12px}
.form-group label{
  display:block;font-size:.75rem;font-weight:500;color:var(--maroon-pale);
  text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;
}
.form-group input{
  width:100%;background:rgba(255,255,255,0.08);border:1px solid rgba(228,168,130,0.25);
  border-radius:8px;padding:9px 14px;font-family:'Inter',sans-serif;font-size:.9rem;
  color:var(--cream);outline:none;transition:border .2s;
}
.form-group input::placeholder{color:rgba(228,168,130,0.4)}
.form-group input:focus{border-color:var(--gold-light);background:rgba(255,255,255,0.12)}
.player-field{margin-bottom:14px}
.player-field>label{margin-bottom:6px}
.player-setup-row{display:flex;align-items:center;gap:10px}
.player-setup-row input[type="text"]{flex:1;min-width:0}
.photo-upload{
  width:44px;height:44px;border-radius:50%;flex-shrink:0;cursor:pointer;
  border:2px dashed rgba(228,168,130,0.45);background:rgba(255,255,255,0.06);
  display:flex;align-items:center;justify-content:center;overflow:hidden;
  transition:border-color .2s,background .2s;position:relative;
}
.photo-upload:hover{border-color:var(--gold-light);background:rgba(255,255,255,0.1)}
.photo-upload img{width:100%;height:100%;object-fit:cover;display:block}
.photo-upload .photo-add{display:flex;align-items:center;justify-content:center;pointer-events:none}
.photo-icon{width:22px;height:22px;color:var(--maroon-pale);opacity:.85;transition:color .2s,opacity .2s}
.photo-upload:hover .photo-icon{color:var(--gold-light);opacity:1}
.photo-upload.has-photo{border-style:solid;border-color:var(--gold-light)}
.photo-clear{
  width:28px;height:28px;border-radius:50%;border:none;background:rgba(0,0,0,0.25);
  color:var(--cream);font-size:1rem;cursor:pointer;flex-shrink:0;line-height:1;
  display:none;align-items:center;justify-content:center;
}
.photo-clear.visible{display:flex}
.setup-config{margin-top:24px;display:flex;justify-content:center}
.setup-config .form-group{margin-bottom:0;min-width:160px}
.setup-config input{text-align:center}
.btn-start{
  display:block;width:100%;margin-top:32px;padding:16px;background:var(--gold);color:var(--maroon-dark);
  font-family:'Oswald',sans-serif;font-size:1.2rem;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;transition:background .2s,transform .1s;
}
.btn-start:hover{background:var(--gold-light);transform:translateY(-1px)}

#match{background:var(--cream);padding-bottom:var(--bottom-h);min-height:100vh}
.match-header{
  background:var(--maroon-dark);padding:10px 24px;display:flex;align-items:center;
  justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,0.3);flex-shrink:0;
}
.match-header img{height:42px;filter:brightness(1.1)}
.match-header-center{flex:1;text-align:center}
.match-round-label{font-size:.7rem;color:var(--maroon-pale);text-transform:uppercase;letter-spacing:2px}
.match-round-num{
  font-family:'Oswald',sans-serif;font-size:1.5rem;font-weight:700;color:var(--cream);letter-spacing:1px;
}
.match-body{
  flex:1;display:grid;grid-template-columns:1fr 300px;grid-template-rows:auto 1fr;gap:0;min-height:0;
}

.scores-bar{
  grid-column:1/-1;background:var(--maroon-mid);display:flex;align-items:stretch;
  box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
.score-side{
  flex:1;display:flex;align-items:center;justify-content:center;padding:14px 32px;gap:16px;
}
.score-side.team-a{background:linear-gradient(90deg,rgba(196,68,26,0.3),transparent)}
.score-side.team-b{background:linear-gradient(-90deg,rgba(46,109,164,0.3),transparent)}
.team-name-big{
  font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:600;text-transform:uppercase;
  letter-spacing:2px;color:var(--cream);
}
.score-num{
  font-family:'Oswald',sans-serif;font-size:3.5rem;font-weight:700;color:var(--gold-light);
  line-height:1;min-width:80px;text-align:center;
}
.score-num.pop{animation:scorePop .4s ease}
.score-divider{
  width:1px;background:rgba(228,168,130,0.2);align-self:stretch;position:relative;
  display:flex;align-items:center;justify-content:center;
}
.score-vs{
  background:var(--maroon-mid);padding:4px 8px;font-family:'Oswald',sans-serif;
  font-size:.85rem;color:var(--maroon-pale);letter-spacing:1px;
}

.main-area{
  padding:20px 24px 24px;display:flex;flex-direction:column;gap:16px;
  min-height:0;overflow:hidden;
}
.player-panels{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;flex:1;min-height:0;
  align-items:stretch;
}
.player-panel{
  background:var(--white);border-radius:var(--radius);border:1.5px solid var(--cream-dark);
  overflow:hidden;box-shadow:var(--shadow);
  display:flex;flex-direction:column;min-height:calc(100vh - var(--bottom-h) - 200px);
}
.panel-header{
  padding:10px 16px;font-family:'Oswald',sans-serif;font-size:.95rem;font-weight:600;
  letter-spacing:2px;text-transform:uppercase;color:var(--white);
}
.panel-header.team-a{background:var(--team-a)}
.panel-header.team-b{background:var(--team-b)}
.player-list{
  padding:12px 10px 14px;flex:1;display:flex;flex-direction:column;
  justify-content:space-between;gap:10px;
}
.player-row{
  display:flex;align-items:center;gap:14px;padding:14px 14px;border-radius:10px;
  transition:background .2s,border-color .2s,box-shadow .2s;cursor:pointer;
  border:2px solid transparent;flex:1;min-height:64px;
}
.player-row:hover{background:rgba(61,28,16,0.04)}
.player-row.selected{
  border-color:var(--gold);background:rgba(212,168,67,0.12);box-shadow:0 0 0 1px rgba(212,168,67,0.3);
}
.player-row.highlight{animation:playerGlow .8s ease}
.player-avatar{
  width:48px;height:48px;border-radius:50%;font-family:'Oswald',sans-serif;font-size:1rem;
  font-weight:600;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--white);
}
.player-avatar.team-a{background:var(--team-a)}
.player-avatar.team-b{background:var(--team-b)}
.player-avatar.has-photo{background:var(--cream-dark);overflow:hidden;padding:0}
.player-avatar img{width:100%;height:100%;object-fit:cover;display:block}
.player-name{flex:1;font-size:1rem;font-weight:500;color:var(--text-primary)}
.player-pts{
  font-family:'Oswald',sans-serif;font-size:1.15rem;font-weight:600;color:var(--maroon-main);
  min-width:40px;text-align:right;
}

.sidebar{
  background:var(--white);border-left:1px solid var(--cream-dark);
  display:flex;flex-direction:column;overflow:hidden;min-height:0;
}
.sidebar-section{padding:16px;flex:1;display:flex;flex-direction:column;overflow:hidden}
.sidebar-title{
  font-family:'Oswald',sans-serif;font-size:.8rem;font-weight:600;text-transform:uppercase;
  letter-spacing:2px;color:var(--maroon-main);margin-bottom:12px;
}
.feed{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.feed-item{
  font-size:.82rem;padding:7px 10px;border-radius:8px;border-left:3px solid;
  animation:slideInRight .3s ease;background:var(--cream);color:var(--text-primary);
}
.feed-item.team-a{border-color:var(--team-a)}
.feed-item.team-b{border-color:var(--team-b)}
.feed-item.neutral{border-color:var(--maroon-pale)}

.bottom-bar{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  background:var(--maroon-dark);border-top:2px solid rgba(212,168,67,0.35);
  padding:12px 20px;display:flex;align-items:center;justify-content:center;
  gap:10px;flex-wrap:wrap;box-shadow:0 -4px 20px rgba(0,0,0,0.25);
}
.bottom-group{display:flex;align-items:center;gap:8px}
.bottom-divider{width:1px;height:36px;background:rgba(228,168,130,0.25);margin:0 4px}
.bottom-label{
  font-size:.65rem;color:var(--maroon-pale);text-transform:uppercase;letter-spacing:1px;
  font-family:'Oswald',sans-serif;margin-right:4px;
}
.btn-action{
  padding:10px 18px;border:none;border-radius:8px;font-family:'Oswald',sans-serif;
  font-size:.85rem;font-weight:600;letter-spacing:1px;cursor:pointer;
  text-transform:uppercase;transition:transform .1s,opacity .2s;white-space:nowrap;
}
.btn-action:active{transform:scale(0.97)}
.btn-action:disabled{opacity:0.4;cursor:not-allowed;transform:none}
.btn-add{background:#2E7D32;color:#fff}
.btn-remove{background:#B71C1C;color:#fff}
.btn-round{background:var(--gold);color:var(--maroon-dark)}
.btn-end{background:var(--maroon-light);color:var(--white)}
.btn-action:hover:not(:disabled){filter:brightness(1.08)}

#round-overlay{
  position:fixed;inset:0;background:var(--maroon-dark);display:flex;flex-direction:column;
  align-items:center;justify-content:center;z-index:1000;pointer-events:none;opacity:0;transition:opacity .35s;
}
#round-overlay.show{opacity:1}
.overlay-label{font-size:.9rem;color:var(--maroon-pale);text-transform:uppercase;letter-spacing:4px;font-family:'Oswald',sans-serif;margin-bottom:8px}
.overlay-num{
  font-family:'Oswald',sans-serif;font-size:6rem;font-weight:700;color:var(--gold-light);
  line-height:1;letter-spacing:4px;
}

#winner{
  background:linear-gradient(160deg,var(--maroon-dark) 0%,var(--maroon-mid) 100%);
  align-items:center;justify-content:center;position:relative;overflow:hidden;
}
.confetti-canvas{position:absolute;inset:0;pointer-events:none}
.winner-card{
  background:rgba(255,255,255,0.07);border:1px solid rgba(228,168,130,0.25);border-radius:24px;
  padding:56px 64px;text-align:center;position:relative;z-index:1;max-width:560px;width:90%;
}
.trophy-icon{font-size:5rem;animation:trophyIn .6s cubic-bezier(0.34,1.56,0.64,1) .2s both}
.winner-label{font-size:.8rem;color:var(--maroon-pale);text-transform:uppercase;letter-spacing:3px;font-family:'Oswald',sans-serif;margin:16px 0 4px}
.winner-name{font-family:'Oswald',sans-serif;font-size:2.8rem;font-weight:700;color:var(--gold-light);letter-spacing:2px}
.winner-scores{display:flex;gap:32px;justify-content:center;margin:24px 0}
.wscore{text-align:center}
.wscore-team{font-size:.75rem;color:var(--maroon-pale);text-transform:uppercase;letter-spacing:1px;font-family:'Oswald',sans-serif}
.wscore-num{font-family:'Oswald',sans-serif;font-size:3rem;font-weight:700;color:var(--cream)}
.mvp-section{margin:20px 0;padding:16px;background:rgba(212,168,67,0.12);border-radius:12px;border:1px solid rgba(212,168,67,0.25)}
.mvp-label{font-size:.7rem;color:var(--gold-light);text-transform:uppercase;letter-spacing:2px;font-family:'Oswald',sans-serif;margin-bottom:4px}
.mvp-row{display:flex;align-items:center;justify-content:center;gap:14px}
.mvp-avatar{
  width:52px;height:52px;border-radius:50%;overflow:hidden;flex-shrink:0;
  background:rgba(255,255,255,0.1);border:2px solid var(--gold-light);
  display:none;align-items:center;justify-content:center;
  font-family:'Oswald',sans-serif;font-size:1rem;color:var(--cream);
}
.mvp-avatar.show{display:flex}
.mvp-avatar img{width:100%;height:100%;object-fit:cover}
.mvp-name{font-size:1.2rem;font-weight:600;color:var(--cream)}
.btn-play-again{
  margin-top:28px;padding:14px 40px;background:var(--gold);color:var(--maroon-dark);
  font-family:'Oswald',sans-serif;font-size:1.1rem;font-weight:700;letter-spacing:3px;
  text-transform:uppercase;border:none;border-radius:10px;cursor:pointer;transition:background .2s,transform .1s;
}
.btn-play-again:hover{background:var(--gold-light);transform:translateY(-2px)}

@keyframes scorePop{0%{transform:scale(1)}50%{transform:scale(1.25)}100%{transform:scale(1)}}
@keyframes playerGlow{0%,100%{background:transparent}30%{background:rgba(212,168,67,0.2)}}
@keyframes slideInRight{from{transform:translateX(30px);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes trophyIn{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}

@media(max-width:800px){
  .setup-grid,.player-panels{grid-template-columns:1fr}
  .match-body{grid-template-columns:1fr}
  .player-panel{min-height:calc(50vh - 60px)}
  .player-list{justify-content:flex-start}
  .player-row{flex:0;min-height:58px}
  .sidebar{max-height:180px;border-left:none;border-top:1px solid var(--cream-dark)}
  .bottom-bar{padding:10px}
  .btn-action{padding:8px 12px;font-size:.75rem}
}
</style>
</head>

<script>
// Photos de profil (base64) pendant la configuration
const setupPhotos = {};

// État du match
let state = {
  teams: { a: "Équipe Alpha", b: "Équipe Beta" },
  players: { a: ["","","",""], b: ["","","",""] },
  playerPhotos: { a: [null,null,null,null], b: [null,null,null,null] },
  scores: { a: 0, b: 0 },
  playerScores: { a: [0,0,0,0], b: [0,0,0,0] },
  round: 1,
  ptsValue: 2,
  selected: null
};

const DEFAULT_NAMES = {
  a: ["Joueur A1","Joueur A2","Joueur A3","Joueur A4"],
  b: ["Joueur B1","Joueur B2","Joueur B3","Joueur B4"]
};

// Construit les champs joueur avec option photo sur l'écran d'initialisation
function buildPlayerFields() {
  ["a","b"].forEach(team => {
    [1,2,3,4].forEach(i => {
      const id = team + i;
      const field = document.getElementById("field-" + id);
      field.innerHTML = `
        <label>Joueur ${i}</label>
        <div class="player-setup-row">
          <label class="photo-upload" for="photo-${id}" title="Ajouter une photo">
            <img id="preview-${id}" alt="" style="display:none">
            <span class="photo-add" id="ph-${id}"><svg class="photo-icon" viewBox="0 0 24 24" fill="none" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2" stroke="currentColor" stroke-width="1.5"/><circle cx="8.5" cy="10.5" r="1.5" stroke="currentColor" stroke-width="1.5"/><path d="M21 16l-5-5a1.5 1.5 0 00-2.1 0L9 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </label>
          <input type="file" id="photo-${id}" accept="image/*" hidden onchange="onPhotoPick('${id}', this)">
          <input type="text" id="${id}" value="${DEFAULT_NAMES[team][i-1]}">
          <button type="button" class="photo-clear" id="clear-${id}" onclick="clearPlayerPhoto('${id}')" title="Supprimer la photo">×</button>
        </div>`;
    });
  });
}

// Redimensionne et compresse l'image pour l'affichage
function resizeImage(file, maxSize, callback) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxSize || h > maxSize) {
        if (w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
        else { w = Math.round(w * maxSize / h); h = maxSize; }
      }
      const canvas = document.createElement("canvas");
      canvas.width = w;
      canvas.height = h;
      canvas.getContext("2d").drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL("image/jpeg", 0.82));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function onPhotoPick(id, input) {
  const file = input.files && input.files[0];
  if (!file || !file.type.startsWith("image/")) return;
  resizeImage(file, 128, dataUrl => {
    setupPhotos[id] = dataUrl;
    const preview = document.getElementById("preview-" + id);
    const placeholder = document.getElementById("ph-" + id);
    const upload = preview.closest(".photo-upload");
    preview.src = dataUrl;
    preview.style.display = "block";
    placeholder.style.display = "none";
    upload.classList.add("has-photo");
    document.getElementById("clear-" + id).classList.add("visible");
  });
  input.value = "";
}

function clearPlayerPhoto(id) {
  delete setupPhotos[id];
  const preview = document.getElementById("preview-" + id);
  const placeholder = document.getElementById("ph-" + id);
  const upload = preview.closest(".photo-upload");
  preview.src = "";
  preview.style.display = "none";
  placeholder.style.display = "";
  upload.classList.remove("has-photo");
  document.getElementById("clear-" + id).classList.remove("visible");
  document.getElementById("photo-" + id).value = "";
}

function getInitials(name) {
  return name.split(" ").map(w => w[0] || "").join("").substring(0, 2).toUpperCase() || "?";
}

function avatarHtml(team, index, name) {
  const photo = state.playerPhotos[team][index];
  const cls = "player-avatar " + (team === "a" ? "team-a" : "team-b") + (photo ? " has-photo" : "");
  if (photo) return `<div class="${cls}"><img src="${photo}" alt="${name}"></div>`;
  return `<div class="${cls}">${getInitials(name)}</div>`;
}

buildPlayerFields();

function startMatch() {
  state.teams.a = document.getElementById("nameA").value.trim() || "Équipe Alpha";
  state.teams.b = document.getElementById("nameB").value.trim() || "Équipe Beta";
  state.players.a = [1,2,3,4].map(i => document.getElementById("a"+i).value.trim() || DEFAULT_NAMES.a[i-1]);
  state.players.b = [1,2,3,4].map(i => document.getElementById("b"+i).value.trim() || DEFAULT_NAMES.b[i-1]);
  state.playerPhotos.a = [1,2,3,4].map(i => setupPhotos["a"+i] || null);
  state.playerPhotos.b = [1,2,3,4].map(i => setupPhotos["b"+i] || null);
  state.ptsValue = parseInt(document.getElementById("ptsValue").value) || 2;
  state.scores = { a: 0, b: 0 };
  state.playerScores = { a: [0,0,0,0], b: [0,0,0,0] };
  state.round = 1;
  state.selected = null;
  updateMatchUI();
  showScreen("match");
  document.getElementById("bottomBar").style.display = "flex";
  updatePtsButtons();
  showRoundOverlay(1);
}

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  document.getElementById("bottomBar").style.display = id === "match" ? "flex" : "none";
}

function updateMatchUI() {
  document.getElementById("roundLabel").textContent = "Manche " + state.round;
  document.getElementById("dispNameA").textContent = state.teams.a;
  document.getElementById("dispNameB").textContent = state.teams.b;
  document.getElementById("panelHeaderA").textContent = state.teams.a;
  document.getElementById("panelHeaderB").textContent = state.teams.b;
  updateScore("a", false);
  updateScore("b", false);
  renderPlayers("a");
  renderPlayers("b");
}

function updateScore(team, animate) {
  const el = document.getElementById("score" + team.toUpperCase());
  el.textContent = state.scores[team];
  if (animate) { el.classList.remove("pop"); void el.offsetWidth; el.classList.add("pop"); }
}

function renderPlayers(team) {
  const container = document.getElementById("players" + team.toUpperCase());
  container.innerHTML = "";
  state.players[team].forEach((name, i) => {
    const row = document.createElement("div");
    const isSelected = state.selected && state.selected.team === team && state.selected.index === i;
    row.className = "player-row" + (isSelected ? " selected" : "");
    row.id = "player_" + team + "_" + i;
    row.innerHTML = `
      ${avatarHtml(team, i, name)}
      <div class="player-name">${name}</div>
      <div class="player-pts" id="pts_${team}_${i}">${state.playerScores[team][i]} pt</div>
    `;
    row.onclick = () => selectPlayer(team, i);
    container.appendChild(row);
  });
}

function selectPlayer(team, index) {
  state.selected = { team, index };
  ["a","b"].forEach(t => {
    state.players[t].forEach((_, i) => {
      const row = document.getElementById("player_" + t + "_" + i);
      if (row) row.classList.toggle("selected", state.selected.team === t && state.selected.index === i);
    });
  });
  updatePtsButtons();
}

function updatePtsButtons() {
  const has = !!state.selected;
  const label = state.ptsValue + " pt" + (state.ptsValue > 1 ? "s" : "");
  const add = document.getElementById("btnAddPts");
  const rem = document.getElementById("btnRemovePts");
  add.disabled = !has;
  rem.disabled = !has;
  add.textContent = "+ " + label;
  rem.textContent = "− " + label;
}

function modifyPoints(sign) {
  if (!state.selected) return;
  const { team, index } = state.selected;
  const pts = state.ptsValue * sign;
  state.scores[team] += pts;
  state.playerScores[team][index] += pts;
  if (state.scores[team] < 0) state.scores[team] = 0;
  if (state.playerScores[team][index] < 0) state.playerScores[team][index] = 0;

  updateScore(team, true);
  const ptsEl = document.getElementById("pts_" + team + "_" + index);
  if (ptsEl) ptsEl.textContent = state.playerScores[team][index] + " pt";

  const row = document.getElementById("player_" + team + "_" + index);
  if (row) { row.classList.remove("highlight"); void row.offsetWidth; row.classList.add("highlight"); }

  const signStr = pts >= 0 ? "+" : "";
  addFeed(signStr + pts + " pt — " + state.teams[team] + " · " + state.players[team][index], team);
}

function addFeed(text, team) {
  const feed = document.getElementById("scoreFeed");
  const item = document.createElement("div");
  item.className = "feed-item " + (team || "neutral");
  item.innerHTML = '<span class="feed-pts">' + text + '</span>';
  feed.insertBefore(item, feed.firstChild);
  const items = feed.querySelectorAll(".feed-item");
  if (items.length > 8) items[items.length - 1].remove();
}

function nextRound() {
  state.round++;
  document.getElementById("roundLabel").textContent = "Manche " + state.round;
  showRoundOverlay(state.round);
  addFeed("— Manche " + state.round + " —", null);
}

function showRoundOverlay(num) {
  const overlay = document.getElementById("round-overlay");
  document.getElementById("overlayNum").textContent = num;
  overlay.classList.add("show");
  setTimeout(() => overlay.classList.remove("show"), 1500);
}

function confirmEndMatch() {
  if (confirm("Terminer le match et afficher les résultats ?")) endMatch();
}

function endMatch() {
  const sa = state.scores.a, sb = state.scores.b;
  const winName = sa > sb ? state.teams.a : sb > sa ? state.teams.b : "Égalité !";
  document.getElementById("winnerName").textContent = winName;
  document.getElementById("wTeamA").textContent = state.teams.a;
  document.getElementById("wTeamB").textContent = state.teams.b;
  document.getElementById("wScoreA").textContent = sa;
  document.getElementById("wScoreB").textContent = sb;

  let mvpName = "—", mvpPts = -1, mvpPhoto = null, mvpInitials = "";
  ["a","b"].forEach(t => {
    state.playerScores[t].forEach((pts, i) => {
      if (pts > mvpPts) {
        mvpPts = pts;
        mvpName = state.players[t][i] + " (" + state.teams[t] + ") — " + pts + " pt";
        mvpPhoto = state.playerPhotos[t][i];
        mvpInitials = getInitials(state.players[t][i]);
      }
    });
  });
  if (mvpPts <= 0) mvpName = "—";
  document.getElementById("mvpName").textContent = mvpName;
  const mvpAvatar = document.getElementById("mvpAvatar");
  if (mvpPts > 0) {
    mvpAvatar.classList.add("show");
    mvpAvatar.innerHTML = mvpPhoto
      ? `<img src="${mvpPhoto}" alt="MVP">`
      : mvpInitials;
  } else {
    mvpAvatar.classList.remove("show");
    mvpAvatar.innerHTML = "";
  }

  showScreen("winner");
  launchConfetti();
}

function resetAll() {
  Object.keys(setupPhotos).forEach(k => delete setupPhotos[k]);
  ["a","b"].forEach(team => {
    [1,2,3,4].forEach(i => clearPlayerPhoto(team + i));
  });
  state = {
    teams: { a: "Équipe Alpha", b: "Équipe Beta" },
    players: { a: ["","","",""], b: ["","","",""] },
    playerPhotos: { a: [null,null,null,null], b: [null,null,null,null] },
    scores: { a: 0, b: 0 },
    playerScores: { a: [0,0,0,0], b: [0,0,0,0] },
    round: 1, ptsValue: 2, selected: null
  };
  document.getElementById("scoreFeed").innerHTML = "";
  document.getElementById("mvpAvatar").classList.remove("show");
  document.getElementById("mvpAvatar").innerHTML = "";
  showScreen("setup");
}

function launchConfetti() {
  const canvas = document.getElementById("confettiCanvas");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  const colors = ["#D4A843","#C4441A","#2E6DA4","#E8A882","#FFFFFF","#F0C97A"];
  const particles = Array.from({length:120}, () => ({
    x: Math.random() * canvas.width,
    y: -10 - Math.random() * 200,
    r: 4 + Math.random() * 6,
    color: colors[Math.floor(Math.random() * colors.length)],
    speed: 2 + Math.random() * 4,
    wobble: Math.random() * 6 - 3,
    rot: Math.random() * Math.PI * 2
  }));
  let frame = 0;
  function draw() {
    ctx.clearRect(0,0,canvas.width,canvas.height);
    particles.forEach(p => {
      p.y += p.speed;
      p.x += Math.sin(frame * 0.05 + p.wobble) * 1.2;
      p.rot += 0.05;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.fillRect(-p.r/2, -p.r/2, p.r, p.r * 0.5);
      ctx.restore();
    });
    frame++;
    if (frame < 300) requestAnimationFrame(draw);
  }
  draw();
}
</script>
